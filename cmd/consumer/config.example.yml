kafka:
  brokers:
    - "kafka-1:9092"
  topic: "bearer-events"

clickhouse:
  address: "clickhouse:9000"
  database: "beaver"
  table: "raw_events"

postgres:
  dsn: "postgres://beaver:beaver@postgres:5432/beaver?sslmode=disable"
  table: "page_state"

metrics:
  listen-address: ":9100"

consumer:
  consumer-group: "beaver-consumer"
